spring:
  application:
    name: boki-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

boki:
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:}
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:}
    allowed-redirect-uris: ${OAUTH_ALLOWED_REDIRECT_URIS:boki://auth/callback}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}
  aws:
    s3:
      enabled: ${AWS_S3_ENABLED:false}
      region: ${AWS_REGION:ap-northeast-2}
      bucket: ${AWS_S3_BUCKET:}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      cleanup:
        fixed-delay-ms: ${AWS_S3_CLEANUP_FIXED_DELAY_MS:60000}
  exchange:
    upbit:
      sync:
        enabled: ${UPBIT_TRADE_SYNC_ENABLED:true}
        fixed-delay-ms: ${UPBIT_TRADE_SYNC_FIXED_DELAY_MS:60000}
        interval-hours: ${UPBIT_TRADE_SYNC_INTERVAL_HOURS:6}
        retry-delay-minutes: ${UPBIT_TRADE_SYNC_RETRY_DELAY_MINUTES:10}
        stale-lock-minutes: ${UPBIT_TRADE_SYNC_STALE_LOCK_MINUTES:30}
        batch-size: ${UPBIT_TRADE_SYNC_BATCH_SIZE:50}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
