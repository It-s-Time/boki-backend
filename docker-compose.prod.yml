services:
  mysql:
    image: mysql:8.4
    container_name: boki-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      TZ: Asia/Seoul
    volumes:
      - boki-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${GHCR_IMAGE:-ghcr.io/your-github-owner/boki-backend}:${IMAGE_TAG:-latest}
    container_name: boki-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:?DB_NAME is required}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
    ports:
      - "8080:8080"

volumes:
  boki-mysql-data:
